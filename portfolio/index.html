<!DOCTYPE html>
<html>
<head>
    <title>Our Portfolio - DNHQ Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f172a; color: white; margin: 0; padding: 20px; }
        h1 { color: #fbbf24; margin-bottom: 30px; }
        
        .gallery-container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 15px; 
            padding: 10px; 
        }

        .portfolio-card { 
            background: #111827; 
            padding: 10px; 
            border-radius: 12px; 
            width: 280px; 
            border: 1px solid #fbbf24;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer; /* Click karne ka nishaan */
            transition: 0.3s;
        }

        .portfolio-card:hover { transform: scale(1.03); }

        .portfolio-card img { 
            width: 100%; 
            height: 200px; 
            border-radius: 8px; 
            object-fit: cover; 
            display: block;
        }

        /* Full Screen Image Modal Style */
        #imgModal {
            display: none; 
            position: fixed; 
            z-index: 9999; 
            padding-top: 50px; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.9);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80%;
            border-radius: 10px;
            border: 2px solid #fbbf24;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        .back-link { display: block; margin-top: 40px; color: #fbbf24; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Our Work Gallery</h1>
    <p style="color: #94a3b8; font-size: 14px;">(Showcasing our expertise in premium lighting design and professional AC installation services across Karachi.)</p>

    <div class="gallery-container">
        <div class="portfolio-card" onclick="openModal('1.jpeg')"><img src="1.jpeg"></div>
        <div class="portfolio-card" onclick="openModal('2.jpeg')"><img src="2.jpeg"></div>
        <div class="portfolio-card" onclick="openModal('3.jpeg')"><img src="3.jpeg"></div>
        <div class="portfolio-card" onclick="openModal('4.jpeg')"><img src="4.jpeg"></div>
        <div class="portfolio-card" onclick="openModal('5.jpeg')"><img src="5.jpeg"></div>
    </div>
<div style="text-align: center; margin-top: 50px; margin-bottom: 40px;">
    <h2 style="color: #fbbf24;">Work Video Portfolio</h2>
    <p style="color: #94a3b8;">Watch our technical expertise in action</p>

    <div style="max-width: 600px; margin: 20px auto; position: relative; padding: 15px;">
        <button onclick="rotatePortfolioVid()" style="position: absolute; top: 25px; right: 25px; background: rgba(251, 191, 36, 0.8); color: black; border: none; border-radius: 5px; cursor: pointer; padding: 8px 12px; z-index: 10; font-weight: bold;">
            <i class="fas fa-sync-alt"></i> Rotate Video
        </button>

        <div style="overflow: hidden; border-radius: 15px; border: 2px solid #fbbf24; background: #000; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;">
            <video id="portfolioVid" controls style="width: 100%; height: 100%; transition: transform 0.4s ease-out;">
                <source src="../tutorial.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
</div>

<script>
let portfolioRotation = 0;

function rotatePortfolioVid() {
    const vid = document.getElementById("portfolioVid");
    portfolioRotation += 90;
    
    if (portfolioRotation >= 360) {
        portfolioRotation = 0;
    }
    
    vid.style.transform = `rotate(${portfolioRotation}deg)`;
    
    // Rotation ke waqt video ka size adjust karna taake wo kategi nahi
    if (portfolioRotation === 90 || portfolioRotation === 270) {
        vid.style.width = "auto";
        vid.style.height = "100%";
    } else {
        vid.style.width = "100%";
        vid.style.height = "auto";
    }
}
</script>
    <div id="imgModal" onclick="this.style.display='none'">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="fullImg">
    </div>

    <a href="../index.html" class="back-link">← Back to Home</a>

    <script>
        function openModal(imgSrc) {
            document.getElementById("imgModal").style.display = "block";
            document.getElementById("fullImg").src = imgSrc;
        }
    </script>

</body>
</html>
