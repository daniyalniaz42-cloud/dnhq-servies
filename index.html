<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DNHQ SERVICES | Professional Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --gold: #fbbf24; --dark: #06090f; --card: #111827; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: var(--text); padding-bottom: 140px; }
        
        .brand-header { background: #000; padding: 35px 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        .logo-main { height: 80px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .brand-title { color: var(--gold); font-weight: 900; font-size: 26px; margin: 0; }
        
        .wrapper { padding: 15px; max-width: 600px; margin: 0 auto; }

        /* 🌟 TOP NAVIGATION (FULLY ACTIVE) */
        .top-nav { display: flex; gap: 10px; margin: 20px 0; }
        .nav-btn { background: var(--card); color: #fff; border: 1px solid #333; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 6px; flex: 1; justify-content: center; cursor: pointer; }
        .nav-btn i { color: var(--gold); }
        .nav-btn:active { background: #1c2533; border-color: var(--gold); transform: scale(0.95); }

        .section-tag { margin: 30px 0 12px; color: var(--gold); font-weight: 800; font-size: 12px; text-transform: uppercase; border-left: 4px solid var(--gold); padding-left: 10px; display: flex; align-items: center; gap: 8px; }
        .svc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .svc-item { background: var(--card); border: 1px solid #1f2937; border-radius: 14px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .svc-item.selected { border-color: var(--gold); background: #1c2533; }
        .svc-item b { font-size: 11px; display: block; color: #fff; margin-bottom: 6px; }
        .svc-rate { color: var(--gold); font-weight: 800; font-size: 12px; }

        /* Modal Styles for Team/Portfolio */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--card); border-top: 4px solid var(--gold); padding: 25px; border-radius: 20px; max-width: 500px; margin: 50px auto; }

        #adminView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .admin-box { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 20px; margin-bottom: 30px; }
        .m-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .cust-card { background: #0f172a; border-left: 4px solid var(--gold); padding: 15px; border-radius: 12px; margin-bottom: 12px; }

        .footer-premium { background: #000; padding: 40px 20px; text-align: center; border-top: 1px solid #1f2937; margin-top: 50px; }
        .footer-text { color: #64748b; font-size: 11px; }
        .admin-trigger { display: inline-block; margin-top: 20px; color: var(--gold); font-size: 10px; text-transform: uppercase; font-weight: 700; cursor: pointer; padding: 8px 18px; border: 1px solid #222; border-radius: 50px; }

        .checkout-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(12px); border-top: 2px solid var(--gold); padding: 18px; display: none; box-sizing: border-box; z-index: 1000; }
        .btn-main { background: var(--gold); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <header class="brand-header">
        <img src="1773452778552.jpeg" class="logo-main" onerror="this.src='https://via.placeholder.com/150?text=DNHQ'">
        <h1 class="brand-title">DNHQ SERVICES</h1>
    </header>

    <div class="wrapper">
        <div class="top-nav">
            <div class="nav-btn" onclick="showTeam()"><i class="fas fa-users"></i> Our Team</div>
            <div class="nav-btn" onclick="showPortfolio()"><i class="fas fa-briefcase"></i> Portfolio</div>
            <div class="nav-btn" onclick="openTutorials()"><i class="fas fa-play-circle"></i> Tutorials</div>
        </div>

        <div class="section-tag"><i class="fas fa-snowflake"></i> Air Conditioning</div>
        <div id="acList" class="svc-grid"></div>

        <div class="section-tag"><i class="fas fa-bolt"></i> Electrical Work</div>
        <div id="elecList" class="svc-grid"></div>

        <div class="section-tag"><i class="fas fa-tools"></i> Appliances & Maintenance</div>
        <div id="appList" class="svc-grid"></div>
    </div>

    <div id="infoModal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modalData"></div>
            <button onclick="closeModal()" class="btn-main" style="margin-top:20px; background:#334155; color:#fff;">CLOSE</button>
        </div>
    </div>

    <div id="adminView">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--gold); margin:0; font-size:20px;">ADMIN CONTROL</h2>
            <button onclick="document.getElementById('adminView').style.display='none'" style="background:#334155; color:#fff; border:none; padding:10px 18px; border-radius:10px; font-weight:bold;">EXIT</button>
        </div>
        <div class="admin-box">
            <input type="text" id="mCust" class="m-input" placeholder="Customer Name">
            <div id="workItems">
                <div style="display:flex; gap:8px; margin-bottom:10px;">
                    <input type="text" class="m-work m-input" style="flex:2; margin:0;" placeholder="Service">
                    <input type="number" class="m-price m-input" style="flex:1; margin:0;" placeholder="Price">
                </div>
            </div>
            <button onclick="addWorkRow()" style="background:#1e293b; color:var(--gold); border:1px solid #333; padding:12px; width:100%; border-radius:10px; margin-bottom:12px; font-weight:bold;">+ ADD ITEM</button>
            <button onclick="saveAndPrint()" class="btn-main">SAVE & GENERATE PDF</button>
        </div>
        <div id="cloudRecords">Syncing Database...</div>
    </div>

    <footer class="footer-premium">
        <div class="footer-text">
            <b>DNHQ SERVICES KARACHI</b><br>
            AC & Electrical Experts | 0315-2458657
        </div>
        <div class="admin-trigger" onclick="adminLogin()">
            <i class="fas fa-lock"></i> Admin Login
        </div>
    </footer>

    <div class="checkout-bar" id="cartBar">
        <div style="display:flex; justify-content:space-between; align-items:center; max-width:550px; margin:0 auto;">
            <div style="flex:1;"><small>TOTAL</small><div style="font-size:20px; font-weight:900; color:var(--gold);">Rs <span id="finalTotal">0</span></div></div>
            <button onclick="sendWA()" class="btn-main" style="width:auto; padding:12px 25px;">BOOK NOW</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwI_fTT4vMiuPjehYhnyADO8_ZS0XifwZbKAuPEqrJoxB-uWf48UjkKuyO9IOHTkJccPw/exec";

        const masterServices = {
            ac: [{n:"Split AC Master Service", p:3500}, {n:"Split AC Normal Service", p:2500}, {n:"AC Gas Refill 1.5T", p:8500}, {n:"AC Installation", p:4000}, {n:"AC PCB Repairing", p:3500}, {n:"AC Leakage Repairing", p:3000}],
            elec: [{n:"Short Circuit Diagnosis", p:1000}, {n:"UPS / Inverter Setup", p:2500}, {n:"Ceiling Fan Fitting", p:700}, {n:"DB Box Dressing", p:3500}, {n:"New Wiring Point", p:1500}],
            app: [{n:"Fridge Gas Refill", p:7500}, {n:"Washing Machine Repair", p:2500}, {n:"Water Dispenser Service", p:2000}, {n:"Microwave Oven Repair", p:2500}]
        };

        let cart = [];
        window.onload = () => { renderList('acList', masterServices.ac); renderList('elecList', masterServices.elec); renderList('appList', masterServices.app); };

        function renderList(id, data) {
            document.getElementById(id).innerHTML = data.map(s => `
                <div class="svc-item" onclick="toggleSvc(this,'${s.n}',${s.p})">
                    <b>${s.n}</b>
                    <div class="svc-rate">Rs ${s.p.toLocaleString()}</div>
                </div>`).join('');
        }

        function toggleSvc(el, n, p) {
            const i = cart.findIndex(c => c.n === n);
            if(i > -1) { cart.splice(i, 1); el.classList.remove('selected'); }
            else { cart.push({n, p}); el.classList.add('selected'); }
            const total = cart.reduce((a, b) => a + b.p, 0);
            document.getElementById('cartBar').style.display = cart.length > 0 ? 'block' : 'none';
            document.getElementById('finalTotal').innerText = total.toLocaleString();
        }

        // --- ACTIVE TOP BUTTON FUNCTIONS ---
        function showTeam() {
            document.getElementById('infoModal').style.display = 'block';
            document.getElementById('modalData').innerHTML = `
                <h2 style="color:var(--gold);">DNHQ TEAM</h2>
                <div style="margin-bottom:15px;"><b>Muhammad Daniyal Niaz</b><br>Expert Electrician & AC Technician</div>
                <div><b>Hassan Qureshi</b><br>Technical Partner & Admin</div>
                <hr style="border:0.5px solid #333; margin:15px 0;">
                <p>Location: Korangi, Karachi</p>`;
        }

        function showPortfolio() {
            document.getElementById('infoModal').style.display = 'block';
            document.getElementById('modalData').innerHTML = `
                <h2 style="color:var(--gold);">OUR PROJECTS</h2>
                <ul style="padding-left:20px; color:#cbd5e1; line-height:1.8;">
                    <li>Textile Machinery Maintenance (Toyota, Toyota Looms)</li>
                    <li>Industrial AC Plant Servicing</li>
                    <li>Complete Home Electrical Wiring</li>
                    <li>PC Hardware Reselling & Customization</li>
                </ul>`;
        }

        function openTutorials() {
            // Replace with your actual YouTube URL
            window.open('https://www.youtube.com/@YourChannel', '_blank');
        }

        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }

        // --- ADMIN & DELETE LOGIC ---
        function adminLogin() { if(prompt("PIN:") === "dnhq123") { document.getElementById('adminView').style.display = 'block'; fetchCloudData(); } }

        async function fetchCloudData() {
            const container = document.getElementById('cloudRecords'); container.innerHTML = "Syncing...";
            try {
                const res = await fetch(SCRIPT_URL + "?v=" + new Date().getTime());
                const data = await res.json();
                const rawData = [...data];
                container.innerHTML = data.reverse().map((d, index) => {
                    const rowId = rawData.length - index + 1;
                    return `<div class="cust-card">
                        <b>${d.client}</b> | Rs ${d.total}<br><small>${d.work}</small>
                        <div style="margin-top:10px; display:flex; gap:10px;">
                            <button onclick='deleteRecord(${rowId}, "${d.client}")' style="background:#ef4444; color:#fff; border:none; padding:5px 10px; border-radius:5px; font-size:10px; cursor:pointer;">DELETE RECORD</button>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) { container.innerHTML = "Error."; }
        }

        async function deleteRecord(row, name) {
            if(!confirm(`Permanent Delete ${name}?`)) return;
            document.getElementById('cloudRecords').innerHTML = "Deleting...";
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "delete", row: row}) });
                setTimeout(fetchCloudData, 1500);
            } catch(e) { fetchCloudData(); }
        }

        function addWorkRow() {
            const div = document.createElement('div'); div.style.display = "flex"; div.style.gap = "8px"; div.style.marginBottom = "10px";
            div.innerHTML = `<input type="text" class="m-work m-input" style="flex:2; margin:0;" placeholder="Service"><input type="number" class="m-price m-input" style="flex:1; margin:0;" placeholder="Price">`;
            document.getElementById('workItems').appendChild(div);
        }

        async function saveAndPrint() {
            const client = document.getElementById('mCust').value; const wInps = document.querySelectorAll('.m-work'); const pInps = document.querySelectorAll('.m-price');
            let rows = []; let total = 0;
            wInps.forEach((n, i) => { if(n.value) { rows.push([n.value, `Rs ${pInps[i].value}`]); total += parseInt(pInps[i].value || 0); } });
            if(!client || rows.length === 0) return alert("Fill data!");
            generatePDF(client, rows, total);
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:"add", date:new Date().toLocaleDateString(), client, work:rows.map(r=>r[0]).join(", "), total}) });
            alert("Saved!"); fetchCloudData();
        }

        function generatePDF(client, rows, total) {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.setFillColor(0,0,0); doc.rect(0,0,210,40,'F');
            doc.setTextColor(251,191,36); doc.setFontSize(22); doc.text("DNHQ SERVICES", 15, 25);
            doc.autoTable({ startY: 50, head: [['Description', 'Price']], body: rows, headStyles: {fillColor:[0,0,0], textColor:[251,191,36]} });
            doc.text(`Total: Rs ${total}`, 140, doc.lastAutoTable.finalY + 15);
            doc.save(`DNHQ_${client}.pdf`);
        }

        function sendWA() { 
            const n = prompt("Name:"); if(!n) return;
            window.location.href = `https://wa.me/923152458657?text=DNHQ ORDER%0AClient: ${n}%0AWork: ${cart.map(c=>c.n).join(", ")}`; 
        }
    </script>
</body>
</html>
