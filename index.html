<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DN/HQ SERVICES</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f0f2f5; text-align: center; color: #1a1a1a; }
        .nav { background: #0f172a; padding: 20px; color: #fbbf24; font-size: 24px; font-weight: bold; border-bottom: 4px solid #fbbf24; }
        .hero { background: #1e293b; color: white; padding: 40px 20px; }
        
        /* Solid Clickable Links */
        .action-link { 
            display: block; background: #fbbf24; color: #000; 
            padding: 15px; text-decoration: none; font-weight: bold; 
            border-radius: 8px; margin: 10px 0; border: 2px solid #000; font-size: 16px;
        }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        .card { background: white; width: 320px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid #ccc; }
        
        /* Admin Section */
        #adminArea { display: none; background: #fff; margin: 20px auto; padding: 25px; border-radius: 15px; max-width: 500px; border: 3px solid #0f172a; text-align: left; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        .admin-btn { background: #334155; color: #fbbf24; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .gen-btn { background: #16a34a; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="nav">DN/HQ SERVICES</div>

    <div class="hero">
        <h1 style="margin:0;">AC & ELECTRICAL EXPERTS</h1>
        <p>Karachi's Trusted Professional Service</p>
        <button class="admin-btn" onclick="var p=prompt('Admin Password:'); if(p==='1234') document.getElementById('adminArea').style.display='block';">Admin Login</button>
    </div>

    <div class="container">
        <div class="card" style="border-color: #3b82f6;">
            <h2 style="color:#3b82f6;">AC TECHNICIAN</h2>
            <p>Select service to book on WhatsApp:</p>
            <a href="https://wa.me/923152458657?text=New%20Booking:%20AC%20Master%20Service" class="action-link" style="background:#3b82f6; color:white;">AC Master Service</a>
            <a href="https://wa.me/923152458657?text=New%20Booking:%20AC%20Gas%20Refill" class="action-link" style="background:#60a5fa; color:white;">AC Gas Refill</a>
        </div>

        <div class="card" style="border-color: #fbbf24;">
            <h2 style="color:#fbbf24;">ELECTRICIAN</h2>
            <p>Select service to book on WhatsApp:</p>
            <a href="https://wa.me/923152458657?text=New%20Booking:%20Light%20Point%20Work" class="action-link">Light Point Work</a>
            <a href="https://wa.me/923152458657?text=New%20Booking:%20Wiring%20Work" class="action-link" style="background:#fef3c7;">New Wiring</a>
        </div>
    </div>

    <div id="adminArea">
        <h2 style="text-align:center; margin-top:0;">BILLING GENERATOR</h2>
        <div class="input-group">
            <label>Customer Name:</label>
            <input type="text" id="custName" placeholder="Name">
        </div>
        <div class="input-group">
            <label>WhatsApp Number:</label>
            <input type="tel" id="custPhone" placeholder="03xxxxxxxxx">
        </div>
        
        <hr>
        <h4 style="margin:10px 0;">Items (Quantity likhein):</h4>
        <div class="input-group">
            <label>Light Points (Rs 500):</label>
            <input type="number" id="lp" value="0">
        </div>
        <div class="input-group">
            <label>Wiring Points (Rs 1500):</label>
            <input type="number" id="wp" value="0">
        </div>
        <div class="input-group">
            <label>AC Master Svc (Rs 3500):</label>
            <input type="number" id="acm" value="0">
        </div>
        <div class="input-group">
            <label>AC Normal Svc (Rs 2500):</label>
            <input type="number" id="acn" value="0">
        </div>

        <button class="gen-btn" onclick="generateFinalBill()">GENERATE BILL</button>

        <div id="billPreview" style="display:none; margin-top:20px; padding:15px; border:2px dashed #333; background:#f9f9f9;">
            <div id="billContent"></div>
            <button class="gen-btn" style="background:#25d366;" onclick="sendToWhatsApp()">SEND TO WHATSAPP</button>
        </div>
    </div>

    <script>
        function generateFinalBill() {
            let name = document.getElementById('custName').value || "Customer";
            let l = parseInt(document.getElementById('lp').value) || 0;
            let w = parseInt(document.getElementById('wp').value) || 0;
            let m = parseInt(document.getElementById('acm').value) || 0;
            let n = parseInt(document.getElementById('acn').value) || 0;

            let total = (l * 500) + (w * 1500) + (m * 3500) + (n * 2500);
            
            if(total === 0) {
                alert("Koi item select karein!");
                return;
            }

            window.currentTotal = total;
            window.currentName = name;

            document.getElementById('billPreview').style.display = 'block';
            document.getElementById('billContent').innerHTML = `
                <center><b>DN/HQ SERVICES RECEIPT</b></center><br>
                <b>Name:</b> ${name}<br>
                ----------------------------<br>
                ${l > 0 ? 'Light Points: ' + l + '<br>' : ''}
                ${w > 0 ? 'Wiring Points: ' + w + '<br>' : ''}
                ${m > 0 ? 'AC Master Svc: ' + m + '<br>' : ''}
                ${n > 0 ? 'AC Normal Svc: ' + n + '<br>' : ''}
                ----------------------------<br>
                <b>GRAND TOTAL: Rs ${total}</b>
            `;
        }

        function sendToWhatsApp() {
            let phone = document.getElementById('custPhone').value;
            if(!phone) { alert("Phone number likhein!"); return; }
            if(phone.startsWith('0')) phone = "92" + phone.substring(1);
            
            let msg = *DN/HQ SERVICES RECEIPT*%0A*Name:* ${window.currentName}%0A*Total Bill:* Rs ${window.currentTotal}%0A_Thank you for your business!_;
            window.open("https://wa.me/" + phone + "?text=" + msg);
        }
    </script>

</body>
</html>
