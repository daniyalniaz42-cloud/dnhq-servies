<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DNHQ SERVICES | Official Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --gold: #fbbf24; --dark: #06090f; --card: #111827; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: var(--text); padding-bottom: 140px; }
        
        /* Header */
        .brand-header { background: #000; padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        .logo-main { height: 90px; border-radius: 15px; margin-bottom: 12px; border: 2px solid #222; }
        .brand-title { color: var(--gold); font-weight: 900; font-size: 28px; margin: 0; letter-spacing: 1px; }
        
        .wrapper { padding: 15px; max-width: 600px; margin: 0 auto; }

        /* Services Grid */
        .section-tag { margin: 35px 0 15px; color: var(--gold); font-weight: 700; font-size: 13px; text-transform: uppercase; border-left: 4px solid var(--gold); padding-left: 12px; display: flex; align-items: center; gap: 8px; }
        .svc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .svc-item { background: var(--card); border: 1px solid #1f2937; border-radius: 16px; padding: 18px; cursor: pointer; transition: 0.3s; }
        .svc-item.selected { border-color: var(--gold); background: #1c2533; box-shadow: 0 0 15px rgba(251,191,36,0.1); }
        .svc-item b { font-size: 13px; display: block; color: #fff; margin-bottom: 8px; line-height: 1.3; }
        .svc-rate { color: var(--gold); font-weight: 800; font-size: 13px; }

        /* Admin & Records */
        #adminView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .admin-box { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 20px; margin-bottom: 30px; border-top: 5px solid var(--gold); }
        .m-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; }
        .cust-card { background: #0f172a; border-left: 4px solid var(--gold); padding: 18px; border-radius: 12px; margin-bottom: 15px; }

        /* Modern Footer with Buttons */
        .footer-premium { background: #000; padding: 40px 20px; text-align: center; border-top: 1px solid #1f2937; margin-top: 50px; }
        .footer-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .nav-btn { background: #111827; color: var(--text); border: 1px solid #333; padding: 10px 15px; border-radius: 10px; font-size: 12px; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .nav-btn i { color: var(--gold); }
        .nav-btn:hover { border-color: var(--gold); background: #1c2533; }
        
        .footer-logo { height: 45px; opacity: 0.8; margin-bottom: 15px; }
        .footer-text { color: #64748b; font-size: 12px; margin-bottom: 20px; }
        .admin-trigger { display: inline-block; color: var(--gold); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; cursor: pointer; padding: 10px 20px; border: 1px solid #222; border-radius: 50px; }

        /* Checkout Bar */
        .checkout-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-top: 2px solid var(--gold); padding: 20px; display: none; box-sizing: border-box; z-index: 1000; }
    </style>
</head>
<body>

    <header class="brand-header">
        <img src="1773452778552.jpeg" class="logo-main" onerror="this.src='https://via.placeholder.com/150?text=DNHQ'">
        <h1 class="brand-title">DNHQ SERVICES</h1>
        <p style="color:#64748b; font-size:12px; margin-top:5px;">Expert Technical Solutions in Karachi</p>
    </header>

    <div class="wrapper">
        <div class="section-tag"><i class="fas fa-snowflake"></i> Air Conditioning</div>
        <div class="svc-grid" id="acList"></div>

        <div class="section-tag"><i class="fas fa-bolt"></i> Electrical Work</div>
        <div class="svc-grid" id="elecList"></div>

        <div class="section-tag"><i class="fas fa-tools"></i> Appliances & Maintenance</div>
        <div class="svc-grid" id="appList"></div>
    </div>

    <div id="adminView">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 style="color:var(--gold); margin:0;">ADMIN DASHBOARD</h2>
            <button onclick="document.getElementById('adminView').style.display='none'" style="background:#334155; color:#fff; border:none; padding:12px 20px; border-radius:12px; font-weight:bold;">EXIT</button>
        </div>
        <div class="admin-box">
            <input type="text" id="mCust" class="m-input" placeholder="Customer Name">
            <div id="workItems">
                <div style="display:flex; gap:10px; margin-bottom:12px;">
                    <input type="text" class="m-work m-input" style="flex:2; margin:0;" placeholder="Service">
                    <input type="number" class="m-price m-input" style="flex:1; margin:0;" placeholder="Price">
                </div>
            </div>
            <button onclick="addWorkRow()" style="background:#1e293b; color:var(--gold); border:1px solid #333; padding:14px; width:100%; border-radius:12px; margin-bottom:15px; font-weight:bold;">+ ADD ITEM</button>
            <button onclick="saveAndPrint()" style="background:var(--gold); color:#000; padding:18px; border-radius:12px; border:none; width:100%; font-weight:900; font-size:16px;">SAVE & DOWNLOAD PDF</button>
        </div>
        <h4 style="color:#64748b; margin-bottom:15px;">RECENT LOGS</h4>
        <div id="cloudRecords">Syncing...</div>
    </div>

    <footer class="footer-premium">
        <div class="footer-nav">
            <a href="#" class="nav-btn"><i class="fas fa-users"></i> Our Team</a>
            <a href="#" class="nav-btn"><i class="fas fa-briefcase"></i> Portfolio</a>
            <a href="#" class="nav-btn"><i class="fas fa-play-circle"></i> Tutorials</a>
        </div>
        
        <img src="1773452778552.jpeg" class="footer-logo" onerror="this.style.display='none'">
        <div class="footer-text">
            <b>DNHQ SERVICES</b><br>
            Quality AC & Electrical Maintenance Karachi.<br>
            Helpline: 0315-2458657
        </div>

        <div class="admin-trigger" onclick="adminLogin()">
            <i class="fas fa-shield-alt"></i> Admin Login
        </div>
    </footer>

    <div class="checkout-bar" id="cartBar">
        <div style="display:flex; justify-content:space-between; align-items:center; max-width:550px; margin:0 auto;">
            <div><small style="color:#94a3b8;">Estimated Total</small><div style="font-size:24px; font-weight:900; color:var(--gold);">Rs <span id="finalTotal">0</span></div></div>
            <button onclick="sendWA()" style="background:var(--gold); color:#000; padding:15px 35px; border-radius:12px; border:none; font-weight:900;">BOOK NOW</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwI_fTT4vMiuPjehYhnyADO8_ZS0XifwZbKAuPEqrJoxB-uWf48UjkKuyO9IOHTkJccPw/exec";

        const masterServices = {
            ac: [
                {n:"Split AC Master Service", p:3500}, {n:"Split AC Normal Service", p:2500},
                {n:"Window AC Service", p:2000}, {n:"AC Gas Refill 1.5T", p:8500},
                {n:"AC Gas Refill 1.0T", p:7500}, {n:"Inverter AC Gas Refill", p:9500},
                {n:"AC Installation", p:4000}, {n:"AC Removal / Dismantle", p:2000},
                {n:"AC PCB Repairing", p:3500}, {n:"AC Leakage Repairing", p:3000},
                {n:"Capacitor / Relay Change", p:1200}, {n:"AC Fan Motor Repair", p:2800},
                {n:"Copper Pipe (per foot)", p:1200}, {n:"AC Bracket Fitting", p:1500},
                {n:"Outer Unit Washing", p:1000}, {n:"Drain Pipe Fix", p:800}
            ],
            elec: [
                {n:"Short Circuit Diagnosis", p:1000}, {n:"DB Box Dressing", p:3500},
                {n:"UPS / Inverter Setup", p:2500}, {n:"New Wiring Point", p:1500},
                {n:"Main Breaker Replacement", p:800}, {n:"Ceiling Fan Fitting", p:700},
                {n:"Switch Board Repair", p:1000}, {n:"Light / Fancy Fitting", p:500},
                {n:"Main Line Repairing", p:2500}, {n:"Exhaust Fan Fitting", p:800},
                {n:"Bracket Fan Fitting", p:600}, {n:"Bell Installation", p:500},
                {n:"Dimmer / Switch Change", p:300}, {n:"Washing Machine Wiring", p:1500}
            ],
            app: [
                {n:"Fridge Gas Refill", p:7500}, {n:"Fridge Thermostat Fix", p:1800},
                {n:"Washing Machine Repair", p:2500}, {n:"Water Dispenser Service", p:2000},
                {n:"Microwave Oven Repair", p:2500}, {n:"Fridge PCB Repair", p:4000},
                {n:"Automatic Machine Repair", p:4500}, {n:"Electric Iron Repair", p:600}
            ]
        };

        let cart = [];
        window.onload = () => {
            renderList('acList', masterServices.ac);
            renderList('elecList', masterServices.elec);
            renderList('appList', masterServices.app);
        };

        function renderList(id, data) {
            document.getElementById(id).innerHTML = data.map(s => `
                <div class="svc-item" onclick="toggleSvc(this,'${s.n}',${s.p})">
                    <b>${s.n}</b>
                    <div class="svc-rate">Rs ${s.p}</div>
                </div>`).join('');
        }

        function toggleSvc(el, n, p) {
            const i = cart.findIndex(c => c.n === n);
            if(i > -1) { cart.splice(i, 1); el.classList.remove('selected'); }
            else { cart.push({n, p}); el.classList.add('selected'); }
            const total = cart.reduce((a, b) => a + b.p, 0);
            document.getElementById('cartBar').style.display = cart.length > 0 ? 'block' : 'none';
            document.getElementById('finalTotal').innerText = total.toLocaleString();
        }

        function adminLogin() {
            if(prompt("SECURE PIN:") === "dnhq123") {
                document.getElementById('adminView').style.display = 'block';
                fetchCloudData();
            }
        }

        function addWorkRow() {
            const div = document.createElement('div');
            div.style.display = "flex"; div.style.gap = "10px"; div.style.marginBottom = "12px";
            div.innerHTML = `<input type="text" class="m-work m-input" style="flex:2; margin:0;" placeholder="Service"><input type="number" class="m-price m-input" style="flex:1; margin:0;" placeholder="Price">`;
            document.getElementById('workItems').appendChild(div);
        }

        async function saveAndPrint() {
            const client = document.getElementById('mCust').value;
            const wInps = document.querySelectorAll('.m-work');
            const pInps = document.querySelectorAll('.m-price');
            let rows = []; let total = 0;
            wInps.forEach((n, i) => { if(n.value) { rows.push([n.value, `Rs ${pInps[i].value}`]); total += parseInt(pInps[i].value || 0); } });
            if(!client || rows.length === 0) return alert("Fill data!");
            generatePDF(client, rows, total);
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:"add", date:new Date().toLocaleDateString(), client, work:rows.map(r=>r[0]).join(", "), total}) });
            alert("Saved!"); fetchCloudData();
        }

        function generatePDF(client, rows, total) {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.setFillColor(0,0,0); doc.rect(0,0,210,45,'F');
            doc.setTextColor(251,191,36); doc.setFontSize(26); doc.text("DNHQ SERVICES", 15, 28);
            doc.autoTable({ startY: 65, head: [['Description', 'Amount']], body: rows, headStyles: {fillColor:[0,0,0], textColor:[251,191,36]} });
            doc.text(`Total: Rs ${total}`, 145, doc.lastAutoTable.finalY + 15);
            doc.save(`DNHQ_${client}.pdf`);
        }

        async function fetchCloudData() {
            const container = document.getElementById('cloudRecords');
            container.innerHTML = "Syncing...";
            try {
                const res = await fetch(SCRIPT_URL + "?v=" + new Date().getTime());
                const data = await res.json();
                const rawData = data.slice(); const displayData = data.slice().reverse();
                container.innerHTML = displayData.map((d, index) => {
                    const actualRowInSheet = rawData.length - index + 1;
                    return `
                    <div class="cust-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <b style="color:var(--gold);">${d.client}</b>
                            <small>${d.date}</small>
                        </div>
                        <p style="font-size:12px; color:#cbd5e1;">${d.work}</p>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b>Rs ${d.total}</b>
                            <div style="display:flex; gap:10px;">
                                <button onclick='reprintPDF(${JSON.stringify(d)})' style="background:#fff; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; font-size:11px;">PDF</button>
                                <button onclick='deleteRecord(${actualRowInSheet}, "${d.client}")' style="background:#ef4444; color:#fff; border:none; padding:8px 15px; border-radius:8px; font-size:11px;">DEL</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) { container.innerHTML = "Error."; }
        }

        async function deleteRecord(row, name) {
            if(!confirm(`Delete ${name}?`)) return;
            document.getElementById('cloudRecords').innerHTML = "Deleting...";
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "delete", row: row}) });
                setTimeout(fetchCloudData, 1500);
            } catch(e) { fetchCloudData(); }
        }

        function reprintPDF(d) { generatePDF(d.client, [[d.work, `Rs ${d.total}`]], d.total); }

        function sendWA() {
            const n = prompt("Name:"); if(!n) return;
            const w = cart.map(c => c.n).join(", ");
            const t = cart.reduce((a, b) => a + b.p, 0);
            window.location.href = `https://wa.me/923152458657?text=*DNHQ ORDER*%0AClient: ${n}%0AWork: ${w}%0ATotal: Rs ${t}`;
        }
    </script>
</body>
</html>
