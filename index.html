<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DN/HQ Services - Fixed</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f1f5f9; text-align: center; color: #333; }
        .nav { background: #0f172a; padding: 15px; color: #eab308; font-size: 20px; font-weight: bold; position: sticky; top: 0; z-index: 999; }
        .hero { background: #1e293b; color: white; padding: 30px; border-bottom: 6px solid #eab308; }
        .btn { display: inline-block; background: #eab308; color: black; padding: 12px 20px; text-decoration: none; font-weight: bold; border-radius: 8px; margin: 5px; cursor: pointer; border: none; font-size: 16px; }
        .card-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 15px; }
        .card { background: white; width: 300px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Modal for Booking Options */
        #bookingModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 380px; }

        /* Admin & Billing */
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 20px; text-align: left; }
        .section-box { background: #f8fafc; padding: 15px; border-radius: 10px; border: 2px solid #cbd5e1; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        
        #receiptArea { display: none; border: 2px dashed #000; padding: 15px; background: #fff; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>

    <div class="nav">
        DN/HQ SERVICES
        <button onclick="var p=prompt('Password:'); if(p==='1234') document.getElementById('adminPanel').style.display='block';" style="float:right; background:#334155; color:#eab308; border:1px solid; padding:5px 10px; cursor:pointer; font-size:12px;">Admin</button>
    </div>

    <div class="hero">
        <h1>AC & ELECTRICAL EXPERTS</h1>
        <p>Reliable Services in Karachi</p>
    </div>

    <div class="card-container">
        <div class="card" style="border-bottom: 8px solid #3b82f6;">
            <h2 style="color:#3b82f6;">AC Service</h2>
            <button class="btn" style="background:#3b82f6; color:white; width:100%;" onclick="openBooking('AC')">Book Service</button>
        </div>
        <div class="card" style="border-bottom: 8px solid #eab308;">
            <h2 style="color:#eab308;">Electrician</h2>
            <button class="btn" style="width:100%;" onclick="openBooking('Electrical')">Book Service</button>
        </div>
    </div>

    <div id="bookingModal">
        <div class="modal-box">
            <h3 id="mTitle" style="margin-top:0;">Select Service</h3>
            <select id="mWork">
                </select>
            <input type="text" id="mName" placeholder="Enter Your Name">
            <button class="btn" style="width:100%; background:#25d366; color:white; margin-top:10px;" onclick="goWhatsApp()">Confirm on WhatsApp</button>
            <button onclick="document.getElementById('bookingModal').style.display='none'" style="background:none; border:none; color:red; margin-top:15px; cursor:pointer; width:100%; font-weight:bold;">CLOSE</button>
        </div>
    </div>

    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0;">ADMIN BILLING</h2>
            <button onclick="document.getElementById('adminPanel').style.display='none';" style="background:red; color:white; border:none; padding:8px 15px; cursor:pointer; font-weight:bold; border-radius:5px;">Logout</button>
        </div>
        <hr>
        
        <label>Customer Details:</label>
        <input type="text" id="bill_n" placeholder="Customer Name">
        <input type="tel" id="bill_p" placeholder="WhatsApp Number">
        
        <div class="section-box">
            <h3 style="margin-top:0; color:#eab308;">Electrician Work</h3>
            Light Pts (500): <input type="number" id="v_light" value="0">
            Wiring Pts (1500): <input type="number" id="v_wire" value="0">
        </div>

        <div class="section-box">
            <h3 style="margin-top:0; color:#3b82f6;">AC Service Work</h3>
            Master Svc (3500): <input type="number" id="v_acm" value="0">
            Normal Svc (2500): <input type="number" id="v_acn" value="0">
        </div>

        <button class="btn" style="width:100%; background:green; color:white; padding:15px;" onclick="generateBill()">GENERATE BILL NOW</button>

        <div id="receiptArea">
            <div id="receiptContent"></div>
            <button class="btn" style="width:100%; background:#25d366; color:white; margin-top:15px;" onclick="sendBillWA()">Send to WhatsApp</button>
        </div>
    </div>

    <script>
        let selectedType = "";
        function openBooking(type) {
            selectedType = type;
            document.getElementById('mTitle').innerText = type + " Services";
            let sel = document.getElementById('mWork');
            if(type === 'AC') {
                sel.innerHTML = '<option>Master Service</option><option>General Service</option><option>Gas Refill</option><option>Installation</option>';
            } else {
                sel.innerHTML = '<option>Light Point Work</option><option>New Wiring</option><option>Short Circuit Repair</option><option>DB Box Fitting</option>';
            }
            document.getElementById('bookingModal').style.display = 'flex';
        }

        function goWhatsApp() {
            let n = document.getElementById('mName').value;
            let w = document.getElementById('mWork').value;
            if(!n) { alert("Please enter name!"); return; }
            window.open("https://wa.me/923152458657?text=Booking: " + selectedType + "%0AWork: " + w + "%0AName: " + n);
            document.getElementById('bookingModal').style.display = 'none';
        }

        function generateBill() {
            let name = document.getElementById('bill_n').value || "Valued Customer";
            let l = parseInt(document.getElementById('v_light').value) || 0;
            let w = parseInt(document.getElementById('v_wire').value) || 0;
            let am = parseInt(document.getElementById('v_acm').value) || 0;
            let an = parseInt(document.getElementById('v_acn').value) || 0;

            let total = (l * 500) + (w * 1500) + (am * 3500) + (an * 2500);
            
            if(total === 0) { alert("Add some quantities first!"); return; }

            window.finalTotal = total;
            window.finalName = name;
            
            document.getElementById('receiptArea').style.display = 'block';
            document.getElementById('receiptContent').innerHTML = `
                <center><b>DN/HQ SERVICES</b></center><br>
                Client: ${name}<br>
                -------------------------<br>
                ${l > 0 ? 'Light Pts: ' + l + ' (Rs '+(l*500)+')<br>' : ''}
                ${w > 0 ? 'Wiring Pts: ' + w + ' (Rs '+(w*1500)+')<br>' : ''}
                ${am > 0 ? 'AC Master: ' + am + ' (Rs '+(am*3500)+')<br>' : ''}
                ${an > 0 ? 'AC Normal: ' + an + ' (Rs '+(an*2500)+')<br>' : ''}
                -------------------------<br>
                <b>GRAND TOTAL: Rs ${total}</b>
            `;
            window.scrollTo(0, document.body.scrollHeight);
        }

        function sendBillWA() {
            let phone = document.getElementById('bill_p').value;
            if(!phone) { alert("Enter Phone Number!"); return; }
            if(phone.startsWith('0')) phone = "92" + phone.substring(1);
            let msg = *DN/HQ SERVICES*%0AClient: ${window.finalName}%0ATotal Bill: *Rs ${window.finalTotal}*%0A_Thank you for your business!_;
            window.open("https://wa.me/" + phone + "?text=" + msg);
        }
    </script>
</body>
</html>
