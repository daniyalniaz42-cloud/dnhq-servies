<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DN/HQ Services | V2.1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Click block hone se bachane ke liye sab se ahem settings */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { font-family: sans-serif; margin: 0; background: #f1f5f9; }
        
        .nav { background: #0f172a; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 10001; }
        .hero { background: #1e293b; color: white; padding: 50px 20px; text-align: center; border-bottom: 5px solid #eab308; position: relative; z-index: 5; }
        
        /* Buttons ko click-ready banane ke liye classes */
        .clickable { 
            cursor: pointer !important; 
            pointer-events: auto !important; 
            position: relative; 
            z-index: 50; 
        }

        .services { padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: white; width: 300px; padding: 20px; border-radius: 15px; text-align: center; shadow: 0 4px 6px rgba(0,0,0,0.1); border-bottom: 5px solid #333; }
        
        #adminPanel { display: none; padding: 20px; background: #fff; min-height: 100vh; position: relative; z-index: 100; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        .btn-green { background: #16a34a; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div class="nav">
        <div style="color:#eab308; font-weight:900;">DN/HQ SERVICES</div>
        <button class="clickable" onclick="showAdmin()" style="background:#334155; color:white; border:none; padding:5px 10px; border-radius:5px;">Admin Login</button>
    </div>

    <div id="main-view">
        <div class="hero">
            <h1 style="margin:0;">AC & ELECTRICAL</h1>
            <p>Reliable Services in Karachi</p>
            <button class="clickable" onclick="openModal('General')" style="background:#eab308; padding:12px 25px; border:none; border-radius:25px; font-weight:bold;">BOOK NOW</button>
        </div>

        <div class="services">
            <div class="card" style="border-color: #3b82f6;">
                <i class="fas fa-snowflake" style="font-size:40px; color:#3b82f6;"></i>
                <h3>AC Technician</h3>
                <button class="clickable" onclick="openModal('AC Technician')" style="background:#3b82f6; color:white; width:100%; padding:10px; border:none; border-radius:8px;">Select Service</button>
            </div>
            <div class="card" style="border-color: #eab308;">
                <i class="fas fa-bolt" style="font-size:40px; color:#eab308;"></i>
                <h3>Electrician</h3>
                <button class="clickable" onclick="openModal('Electrician')" style="background:#eab308; color:black; width:100%; padding:10px; border:none; border-radius:8px;">Select Service</button>
            </div>
        </div>
    </div>

    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Admin Dashboard</h2>
            <button onclick="hideAdmin()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">Logout</button>
        </div>
        <hr>
        <div style="background:#f8fafc; padding:20px; border-radius:15px; margin-bottom:20px;">
            <h3>Generate Bill</h3>
            <input type="text" id="c_name" placeholder="Customer Name">
            <input type="tel" id="c_phone" placeholder="WhatsApp Number">
            <p>AC Master (3500): <input type="number" id="v_acm" value="0"></p>
            <p>Electric Board (500): <input type="number" id="v_eb" value="0"></p>
            <button class="btn-green clickable" onclick="makeBill()">Create & Send</button>
        </div>
        
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQh7oi7i-aqkfxZPRJ6MnQTnkgjm2RP5t_R4lhuGHtMz98ZCNyAqaefyOVRdWLZ4de4fAWLwXzwGKXx/pubhtml?widget=true&amp;headers=false" style="width:100%; height:400px; border:1px solid #ccc;"></iframe>
    </div>

    <div id="bookingModal" class="modal">
        <div class="modal-box">
            <h3 id="svcTitle">Booking</h3>
            <input type="text" id="uName" placeholder="Your Name">
            <input type="tel" id="uPhone" placeholder="Mobile Number">
            <button class="btn-green clickable" onclick="sendBooking()">Confirm</button>
            <button onclick="closeModal()" style="background:none; border:none; color:red; margin-top:15px;">Cancel</button>
        </div>
    </div>

    <script>
        function showAdmin() {
            let pass = prompt("Enter Password:");
            if(pass === "1234") {
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('main-view').style.display = 'none';
            } else if(pass !== null) { alert("Wrong!"); }
        }

        function hideAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
        }

        function openModal(svc) {
            document.getElementById('svcTitle').innerText = svc;
            document.getElementById('bookingModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('bookingModal').style.display = 'none';
        }

        function sendBooking() {
            let n = document.getElementById('uName').value;
            let p = document.getElementById('uPhone').value;
            if(!n || !p) { alert("Fill details!"); return; }
            alert("Sent! Opening WhatsApp...");
            window.open("https://wa.me/923152458657?text=New Booking: " + n);
            closeModal();
        }

        function makeBill() {
            let name = document.getElementById('c_name').value || "Customer";
            let phone = document.getElementById('c_phone').value;
            let acm = document.getElementById('v_acm').value;
            let eb = document.getElementById('v_eb').value;
            let total = (acm * 3500) + (eb * 500);
            
            if(total === 0) { alert("Add items!"); return; }
            
            let msg = *DN/HQ SERVICES*\nName: ${name}\nTotal: Rs ${total};
            window.open(https://wa.me/92${phone.substring(1)}?text=${encodeURIComponent(msg)});
        }
    </script>
</body>
</html>
