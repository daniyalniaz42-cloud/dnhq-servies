<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DN/HQ Services | Professional Billing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* BASE STYLES */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background: #f4f7f6; color: #333; }

        /* NAVBAR */
        .nav { background: #0f172a; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 9999; }
        .logo { color: #eab308; font-size: 20px; font-weight: 900; }
        .admin-btn { background: #334155; color: #eab308; border: 1px solid #eab308; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* HERO */
        .hero { background: #1e293b; color: white; padding: 60px 20px; text-align: center; border-bottom: 8px solid #eab308; }
        .hero h1 { font-size: 30px; margin: 0; text-transform: uppercase; }
        .hero p { color: #94a3b8; margin: 10px 0 25px; }
        .book-main { background: #eab308; color: #000; padding: 15px 30px; border: none; border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* SERVICE CARDS */
        .services-grid { padding: 40px 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: white; width: 300px; padding: 30px 20px; border-radius: 15px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-bottom: 6px solid #ccc; }
        .card i { font-size: 40px; margin-bottom: 15px; }
        .card h3 { margin: 10px 0; font-size: 22px; }
        .card.ac { border-color: #3b82f6; } .card.ac i { color: #3b82f6; }
        .card.elec { border-color: #eab308; } .card.elec i { color: #eab308; }
        .card.ind { border-color: #334155; } .card.ind i { color: #334155; }
        .card-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }

        /* ADMIN PANEL */
        #adminPanel { display: none; padding: 20px; background: #fff; position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh; z-index: 10000; }
        .billing-box { background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-top: 5px; }
        .gen-btn { background: #16a34a; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10001; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        
        #receipt { display: none; margin-top: 20px; padding: 15px; border: 2px dashed #333; background: #fff; }
    </style>
</head>
<body>

    <div class="nav">
        <div class="logo">DN/HQ SERVICES</div>
        <button class="admin-btn" onclick="showAdmin()">Admin Login</button>
    </div>

    <div id="mainPage">
        <div class="hero">
            <h1>AC & Electrical Experts</h1>
            <p>Trusted Technical Services in Karachi</p>
            <button class="book-main" onclick="openModal('General Inquiry')">Book Now</button>
        </div>

        <div class="services-grid">
            <div class="card ac">
                <i class="fas fa-snowflake"></i>
                <h3>AC Technician</h3>
                <button class="card-btn" style="background:#3b82f6" onclick="openModal('AC Technician')">Book Now</button>
            </div>
            <div class="card elec">
                <i class="fas fa-bolt"></i>
                <h3>Electrician</h3>
                <button class="card-btn" style="background:#eab308; color:#000" onclick="openModal('Electrician')">Book Now</button>
            </div>
            <div class="card ind">
                <i class="fas fa-industry"></i>
                <h3>Maintenance</h3>
                <button class="card-btn" style="background:#334155" onclick="openModal('Maintenance')">Book Now</button>
            </div>
        </div>
    </div>

    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>ADMIN PANEL</h2>
            <button onclick="hideAdmin()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:5px;">Close</button>
        </div>
        <hr>
        <div class="billing-box">
            <h3>Invoice Generator</h3>
            <div class="input-group">
                <label>Customer Name:</label>
                <input type="text" id="inv_name" placeholder="Name">
            </div>
            <div class="input-group">
                <label>WhatsApp Number:</label>
                <input type="tel" id="inv_phone" placeholder="03XXXXXXXXX">
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>AC Master (3500): <input type="number" id="q_acm" value="0"></div>
                <div>AC Normal (2500): <input type="number" id="q_acn" value="0"></div>
                <div>Switch Board (500): <input type="number" id="q_sb" value="0"></div>
                <div>Visit Fee (1000): <input type="checkbox" id="v_fee" style="width:auto"></div>
            </div>
            <button class="gen-btn" onclick="generateBill()">Generate & Send WhatsApp</button>
            <div id="receipt"></div>
        </div>

        <h3>Recent Bookings (Google Sheet)</h3>
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQh7oi7i-aqkfxZPRJ6MnQTnkgjm2RP5t_R4lhuGHtMz98ZCNyAqaefyOVRdWLZ4de4fAWLwXzwGKXx/pubhtml?widget=true&amp;headers=false" style="width:100%; height:400px; border:1px solid #ccc; border-radius:10px;"></iframe>
    </div>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <h2 id="svcTitle">Booking</h2>
            <input type="text" id="uName" placeholder="Full Name">
            <input type="tel" id="uPhone" placeholder="Phone Number">
            <button class="gen-btn" style="background:#eab308; color:#000; margin-top:10px;" onclick="saveBooking()">Confirm Booking</button>
            <button onclick="closeModal()" style="background:none; border:none; color:red; margin-top:15px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        var selectedSvc = "";

        function openModal(svc) {
            selectedSvc = svc;
            document.getElementById('svcTitle').innerText = svc;
            document.getElementById('bookingModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('bookingModal').style.display = 'none';
        }

        function showAdmin() {
            var p = prompt("Password:");
            if(p === "1234") {
                document.getElementById('adminPanel').style.display = 'block';
                window.scrollTo(0,0);
            } else if(p !== null) { alert("Wrong Password!"); }
        }

        function hideAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        function saveBooking() {
            var n = document.getElementById('uName').value;
            var p = document.getElementById('uPhone').value;
            if(!n || !p) { alert("Fill Details!"); return; }
            
            // Google Sheet submission
            var formUrl = "https://docs.google.com/forms/d/e/1FAIpQLScGhlhZtgQk9QC5uqQv6L9Ne_-WVLLHoYxRzJd5WYrmubM2WQ/formResponse";
            fetch(${formUrl}?entry.75173003=${encodeURIComponent(n)}&entry.1151320485=${encodeURIComponent(p)}&entry.428181070=${encodeURIComponent(selectedSvc)}&submit=Submit, { mode: 'no-cors' });

            alert("Booking Saved! Opening WhatsApp...");
            window.open("https://wa.me/923152458657?text=New Booking: " + n + " for " + selectedSvc);
            closeModal();
        }

        function generateBill() {
            var name = document.getElementById('inv_name').value || "Customer";
            var phone = document.getElementById('inv_phone').value;
            var total = (document.getElementById('q_acm').value * 3500) + 
                        (document.getElementById('q_acn').value * 2500) + 
                        (document.getElementById('q_sb').value * 500);
            
            if(document.getElementById('v_fee').checked) { total += 1000; }
            
            if(total === 0) { alert("Add Items!"); return; }
            
            var msg = *DN/HQ SERVICES*\nName: ${name}\nTotal: Rs ${total};
            document.getElementById('receipt').style.display = 'block';
            document.getElementById('receipt').innerHTML = <h4>Bill Generated</h4><p>Total: Rs ${total}</p><button onclick="window.open('https://wa.me/92${phone.substring(1)}?text=${encodeURIComponent(msg)}')">Send to WhatsApp</button>;
        }
    </script>
</body>
</html>
