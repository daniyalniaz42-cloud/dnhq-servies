<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DN/HQ Services</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f1f5f9; text-align: center; }
        .nav { background: #0f172a; padding: 15px; display: flex; justify-content: space-between; align-items: center; color: #eab308; position: sticky; top: 0; z-index: 1000; }
        .hero { background: #1e293b; color: white; padding: 50px 20px; border-bottom: 8px solid #eab308; }
        
        /* Buttons & Links */
        .btn-link { 
            display: inline-block; background: #eab308; color: black; 
            padding: 15px 25px; text-decoration: none; font-weight: bold; 
            border-radius: 10px; margin: 10px; cursor: pointer; border: none;
        }

        .card-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        .card { background: white; width: 300px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Admin Section */
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 20px; text-align: left; }
        .billing-box { background: #eee; padding: 20px; border-radius: 10px; margin: 20px 0; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        
        #receiptArea { display: none; border: 2px dashed #000; padding: 15px; background: #fff; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="nav">
        <b style="font-size: 20px;">DN/HQ SERVICES</b>
        <button onclick="openAdmin()" style="background:#334155; color:#eab308; border:1px solid; padding:8px 15px; cursor:pointer; font-weight:bold;">Admin Login</button>
    </div>

    <div id="mainContent">
        <div class="hero">
            <h1>AC & ELECTRICAL EXPERTS</h1>
            <p>Professional Technical Solutions</p>
            <a href="https://wa.me/923152458657?text=I%20need%20a%20service" class="btn-link">BOOK ON WHATSAPP</a>
        </div>

        <div class="card-container">
            <div class="card" style="border-bottom: 8px solid #3b82f6;">
                <h2 style="color:#3b82f6;">AC Service</h2>
                <a href="https://wa.me/923152458657?text=AC%20Service%20Booking" class="btn-link" style="background:#3b82f6; color:white;">Select</a>
            </div>
            <div class="card" style="border-bottom: 8px solid #eab308;">
                <h2 style="color:#eab308;">Electrician</h2>
                <a href="https://wa.me/923152458657?text=Electrician%20Booking" class="btn-link">Select</a>
            </div>
        </div>
    </div>

    <div id="adminPanel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0;">ADMIN DASHBOARD</h2>
            <button onclick="closeAdmin()" style="background:red; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>
        <hr>
        
        <div class="billing-box">
            <h3>Bill Generator (Receipt)</h3>
            <input type="text" id="custName" placeholder="Customer Name">
            <input type="tel" id="custPhone" placeholder="WhatsApp (e.g. 03152458657)">
            <input type="number" id="billAmount" placeholder="Total Amount (Rs)">
            <button onclick="generateReceipt()" class="btn-link" style="background:green; color:white; width:100%; margin:0;">Create Receipt</button>
            
            <div id="receiptArea">
                <div id="receiptContent"></div>
                <button onclick="sendWhatsAppBill()" class="btn-link" style="background:#25d366; color:white; width:100%; margin-top:10px;">Send via WhatsApp</button>
            </div>
        </div>

        <h3>Booking History</h3>
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQh7oi7i-aqkfxZPRJ6MnQTnkgjm2RP5t_R4lhuGHtMz98ZCNyAqaefyOVRdWLZ4de4fAWLwXzwGKXx/pubhtml" style="width:100%; height:400px; border:1px solid #ccc;"></iframe>
    </div>

    <script>
        function openAdmin() {
            var p = prompt("Enter Password:");
            if(p === "1234") {
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('mainContent').style.display = 'none';
            }
        }

        function closeAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }

        function generateReceipt() {
            var n = document.getElementById('custName').value;
            var a = document.getElementById('billAmount').value;
            if(!n || !a) { alert("Please fill Name and Amount!"); return; }

            document.getElementById('receiptArea').style.display = 'block';
            document.getElementById('receiptContent').innerHTML = `
                <div style="text-align:center;">
                    <h3 style="margin:0;">DN/HQ SERVICES</h3>
                    <p style="font-size:12px;">Professional Maintenance</p>
                    <hr>
                    <p><b>Client:</b> ${n}</p>
                    <p><b>Total Bill:</b> Rs ${a}</p>
                    <p style="font-size:10px;">Thank you for your business!</p>
                </div>
            `;
        }

        function sendWhatsAppBill() {
            var n = document.getElementById('custName').value;
            var p = document.getElementById('custPhone').value;
            var a = document.getElementById('billAmount').value;
            
            var msg = "DN/HQ SERVICES%0A------------------%0A*Name:* " + n + "%0A*Total Bill:* Rs " + a + "%0A------------------%0A_Thank you for your trust!_";
            
            // Format number (removes first 0 and adds 92)
            if(p.startsWith('0')) { p = "92" + p.substring(1); }
            
            window.open("https://wa.me/" + p + "?text=" + msg);
        }
    </script>

</body>
</html>
