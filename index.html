<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DNHQ SERVICES | Official</title>
    <link rel="manifest" href="manifest.json?v=9">
    <meta name="theme-color" content="#fbbf24">
    <link rel="apple-touch-icon" href="1773452778552.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --dark: #070a13; --gold: #fbbf24; --card: #111827; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0f172a; color: var(--text); padding-bottom: 160px; }
        .brand-header { background: #000; padding: 30px 20px 25px; text-align: center; border-bottom: 4px solid var(--gold); border-radius: 0 0 30px 30px; }
        .logo-main { height: 85px; display: block; margin: 0 auto; border-radius: 10px; }
        .brand-title { color: var(--gold); font-size: 24px; font-weight: 900; margin-top: 15px; text-transform: uppercase; }
        #installBtn { display: none; background: #fbbf24; color: black; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; margin: 15px auto; cursor: pointer; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-5px);} 60% {transform: translateY(-3px);} }
        .wrapper { padding: 15px; max-width: 600px; margin: 0 auto; }
        .nav-container { display: flex; gap: 10px; margin: 20px 0; justify-content: center; }
        .nav-btn { flex: 1; background: var(--card); border: 1px solid var(--gold); color: white; padding: 12px; border-radius: 12px; text-decoration: none; text-align: center; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .nav-btn:active { background: var(--gold); color: black; }
        .section-tag { display: flex; align-items: center; margin: 30px 0 15px; }
        .section-tag h2 { font-size: 14px; color: #94a3b8; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .section-line { flex-grow: 1; height: 1px; background: rgba(251, 191, 36, 0.2); margin-left: 15px; }
        .svc-item { background: var(--card); border: 1px solid #1f2937; border-radius: 15px; margin-bottom: 10px; padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .svc-item.selected { border: 2px solid var(--gold); background: #000; }
        .svc-meta b { display: block; font-size: 16px; color: white; }
        .svc-meta p { font-size: 12px; color: #94a3b8; margin: 0; }
        .svc-rate { font-weight: 800; color: var(--gold); text-align: right; }
        .checkout-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); padding: 20px; display: none; box-sizing: border-box; z-index: 2000; }
        .btn-wa { background: #22c55e; color: white; padding: 15px 30px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        #adminView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #070a13; z-index: 9999; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .log-card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 15px; margin-bottom: 15px; color: white; }
        footer { background: #000; color: #64748b; padding: 40px 20px; text-align: center; }
        .social-links { margin: 15px 0; }
        .social-links a { color: var(--gold); text-decoration: none; margin: 0 10px; font-size: 20px; }
        .m-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #1f2937; background: #070a13; color: white; box-sizing: border-box; }
        .m-btn { width: 100%; background: #22c55e; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .backup-btn { background: #3b82f6; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header class="brand-header">
        <img src="1773452778552.jpeg" class="logo-main" id="brandLogo" alt="DNHQ">
        <div class="brand-title">DNHQ SERVICES</div>
        <button id="installBtn">📲 INSTALL APP</button>
    </header>

    <div class="wrapper">
        <div class="nav-container">
            <a href="portfolio/index.html" class="nav-btn"><i class="fas fa-images"></i> OUR WORK</a>
            <a href="team/index.html" class="nav-btn"><i class="fas fa-users"></i> OUR TEAM</a>
        </div>

        <div style="text-align: center; margin-bottom: 25px;">
            <button onclick="playVid()" id="vidBtn" class="nav-btn" style="background: #fbbf24; color: black; font-weight: bold; width: 80%; display: inline-block; cursor: pointer; border: none; padding: 12px 0; border-radius: 10px;">
                <i class="fas fa-play-circle"></i> WATCH TUTORIAL
            </button>
            <div id="videoBox" style="display: none; margin-top: 15px;">
                <video id="myVideo" controls style="width: 90%; border-radius: 12px; border: 2px solid #fbbf24; background: #000;">
                    <source src="tutorial.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <div class="section-tag"><h2>Air Conditioning</h2><div class="section-line"></div></div>
        <div class="svc-item" onclick="toggleSvc(this, 'AC Master Service', 3500)"><div class="svc-meta"><b>Master Service</b><p>Chemical Wash</p></div><div class="svc-rate">Rs 3,500</div></div>
        <div class="svc-item" onclick="toggleSvc(this, 'AC Normal Service', 2500)"><div class="svc-meta"><b>Normal Service</b><p>Filter Cleaning</p></div><div class="svc-rate">Rs 2,500</div></div>

        <div class="section-tag"><h2>Electrical Work</h2><div class="section-line"></div></div>
        <div class="svc-item" onclick="toggleSvc(this, 'Short Circuit Repair', 1000)"><div class="svc-meta"><b>Fault Finding</b><p>Tracing & Fixing</p></div><div class="svc-rate">Rs 1,000</div></div>
    </div>

    <div id="adminView">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid gold; padding-bottom:10px; margin-bottom:20px;">
            <h2 style="color:gold; margin:0;">DNHQ RECORDS</h2>
            <button onclick="document.getElementById('adminView').style.display='none'" style="background:red; color:white; border:none; padding:5px 15px; border-radius:5px;">CLOSE</button>
        </div>
        
        <div style="background:#111827; padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid #fbbf24;">
            <h4 style="margin:0 0 10px 0; color:#fbbf24;">Manual Order (Call/Direct)</h4>
            <input type="text" id="mClient" class="m-input" placeholder="Customer Name">
            <input type="text" id="mWork" class="m-input" placeholder="Work Details">
            <input type="number" id="mTotal" class="m-input" placeholder="Total Amount (Rs)">
            <button class="m-btn" onclick="saveManualOrder()">SAVE TO LIST</button>
        </div>

        <div id="logItems">Data loading...</div>
    </div>

    <div class="checkout-bar" id="cart">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto;">
            <div><small>Total Bill</small><div style="font-size:20px; font-weight:900;">Rs <span id="billTotal">0</span></div></div>
            <button class="btn-wa" onclick="placeOrder()">PLACE ORDER</button>
        </div>
    </div>

    <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwI_fTT4vMiuPjehYhnyADO8_ZS0XifwZbKAuPEqrJoxB-uWf48UjkKuyO9IOHTkJccPw/exec";
    let cart = [];

    function playVid() {
        var x = document.getElementById("videoBox");
        var v = document.getElementById("myVideo");
        if (x.style.display === "none") {
            x.style.display = "block"; v.play();
            document.getElementById("vidBtn").innerHTML = '<i class="fas fa-times-circle"></i> CLOSE VIDEO';
        } else {
            x.style.display = "none"; v.pause();
            document.getElementById("vidBtn").innerHTML = '<i class="fas fa-play-circle"></i> WATCH TUTORIAL';
        }
    }

    function toggleSvc(el, name, price) {
        const idx = cart.findIndex(c => c.name === name);
        if (idx > -1) { cart.splice(idx, 1); el.classList.remove('selected'); } 
        else { cart.push({name, price}); el.classList.add('selected'); }
        const total = cart.reduce((a, b) => a + b.price, 0);
        document.getElementById('cart').style.display = cart.length > 0 ? 'block' : 'none';
        document.getElementById('billTotal').innerText = total.toLocaleString();
    }

    async function placeOrder() {
        const user = prompt("Customer Name:") || "Client";
        const total = cart.reduce((a, b) => a + b.price, 0);
        const work = cart.map(c => c.name).join(", ");
        const date = new Date().toLocaleDateString();
        window.location.href = `https://wa.me/923152458657?text=*DNHQ ORDER*%0AClient: ${user}%0AWork: ${work}%0ATotal: Rs ${total}`;
    }

    function openAdmin() {
        if(prompt("Enter PIN:") === "dnhq123") {
            document.getElementById('adminView').style.display = 'block';
            loadLogs();
        }
    }

    function saveManualOrder() {
        const client = document.getElementById('mClient').value;
        const work = document.getElementById('mWork').value;
        const total = document.getElementById('mTotal').value;
        if(!client || !work || !total) return alert("Fill all fields!");
        alert("Record added locally. Click BACKUP to sync with Sheet.");
        loadLogs(); // Refresh list to show new manual item
    }

    async function backupToSheet(btn, client, work, total) {
        if(!confirm("Backup this record to Google Sheet?")) return;
        btn.innerHTML = "Syncing..."; btn.disabled = true;
        const date = new Date().toLocaleDateString();
        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({date, client, work, total: parseInt(total)}) 
            });
            btn.innerHTML = "✅ SYNCED"; btn.style.background = "#22c55e";
        } catch(e) { btn.innerHTML = "❌ RETRY"; btn.disabled = false; }
    }

    async function loadLogs() {
        const container = document.getElementById('logItems');
        container.innerHTML = "Updating List...";
        try {
            const res = await fetch(SCRIPT_URL + "?v=" + Math.random());
            const data = await res.json();
            container.innerHTML = data.reverse().map(d => `
                <div class="log-card">
                    <div style="display:flex; justify-content:space-between;"><b>${d.client}</b><small>${d.date || ''}</small></div>
                    <p style="margin:5px 0; font-size:13px; color:#94a3b8;">${d.work}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b style="color:gold;">Rs ${d.total}</b>
                        <div style="display:flex; gap:5px;">
                            <button class="backup-btn" onclick="backupToSheet(this, '${d.client}', '${d.work}', ${d.total})">BACKUP</button>
                            <button onclick='generatePDF(${JSON.stringify(d)})' style="background:gold; color:black; border:none; padding:5px 10px; border-radius:5px; font-weight:bold; cursor:pointer;">PDF</button>
                            <button onclick="deleteRec('${d.client}', ${d.total})" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">DEL</button>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch(e) { container.innerHTML = "Error loading logs."; }
    }

    async function deleteRec(client, total) {
        if(confirm("Delete this record?")) {
            await fetch(SCRIPT_URL + `?del=true&client=${encodeURIComponent(client)}&total=${total}`, {mode: 'no-cors'});
            setTimeout(() => loadLogs(), 1500);
        }
    }

    function generatePDF(order) {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFillColor(0,0,0); doc.rect(0,0,210,35,'F');
        doc.setTextColor(251, 191, 36); doc.setFontSize(22); doc.text("DNHQ SERVICES", 45, 22);
        doc.setTextColor(0,0,0); doc.setFontSize(12);
        doc.text(`Invoice: ${order.client}`, 15, 50);
        doc.text(`Date: ${order.date || new Date().toLocaleDateString()}`, 15, 57);
        doc.autoTable({ startY: 65, head: [['Description', 'Amount']], body: [[order.work, `Rs ${order.total}`]], headStyles: { fillColor: [0,0,0], textColor: [251,191,36] } });
        doc.save(`DNHQ_${order.client}.pdf`);
    }
    </script>
</body>
</html>
