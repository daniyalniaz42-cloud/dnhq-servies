<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DNHQ SERVICES | Professional Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --gold: #fbbf24; --dark: #06090f; --card: #111827; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: var(--dark); color: var(--text); padding-bottom: 120px; overflow-x: hidden; }
        
        /* Premium Header */
        .brand-header { background: #000; padding: 30px 20px; text-align: center; border-bottom: 3px solid var(--gold); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .logo-main { height: 85px; border-radius: 15px; margin-bottom: 10px; border: 2px solid #222; }
        .brand-title { color: var(--gold); font-weight: 900; font-size: 26px; letter-spacing: 1px; margin: 0; }
        
        .wrapper { padding: 15px; max-width: 600px; margin: 0 auto; }

        /* Modern Grid for Services */
        .section-tag { margin: 30px 0 15px; color: var(--gold); font-weight: 700; font-size: 14px; text-transform: uppercase; border-left: 4px solid var(--gold); padding-left: 12px; display: flex; align-items: center; gap: 8px; }
        .svc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .svc-item { background: var(--card); border: 1px solid #1f2937; border-radius: 14px; padding: 15px; cursor: pointer; transition: all 0.3s ease; position: relative; }
        .svc-item:active { transform: scale(0.95); }
        .svc-item.selected { border-color: var(--gold); background: #1c2533; box-shadow: 0 0 15px rgba(251,191,36,0.15); }
        .svc-item b { font-size: 13px; display: block; color: #fff; margin-bottom: 6px; line-height: 1.3; }
        .svc-rate { color: var(--gold); font-weight: 800; font-size: 12px; display: flex; align-items: center; gap: 4px; }

        /* Admin Dashboard */
        #adminView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .admin-box { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 20px; margin-bottom: 30px; border-top: 5px solid var(--gold); }
        .m-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 10px; margin-bottom: 12px; box-sizing: border-box; font-size: 14px; }
        .cust-card { background: #0f172a; border-left: 5px solid var(--gold); padding: 18px; border-radius: 12px; margin-bottom: 15px; position: relative; }
        .btn-del { background: #ef4444; color: #fff; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }

        /* Floating Checkout */
        .checkout-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-top: 2px solid var(--gold); padding: 20px; display: none; box-sizing: border-box; z-index: 1000; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .footer-info { text-align: center; padding: 40px 20px; opacity: 0.4; font-size: 11px; color: #94a3b8; }
    </style>
</head>
<body>

    <header class="brand-header">
        <img src="1773452778552.jpeg" id="brandLogo" class="logo-main" onerror="this.src='https://via.placeholder.com/150?text=DNHQ'">
        <h1 class="brand-title">DNHQ SERVICES</h1>
        <p style="color:#94a3b8; font-size:12px; margin:5px 0 0;">Electrician & AC Maintenance Expert</p>
    </header>

    <div class="wrapper">
        <div class="section-tag"><i class="fas fa-snowflake"></i> Air Conditioning</div>
        <div class="svc-grid" id="acList"></div>

        <div class="section-tag"><i class="fas fa-bolt"></i> Electrical Work</div>
        <div class="svc-grid" id="elecList"></div>

        <div class="section-tag"><i class="fas fa-tools"></i> Appliances & Repair</div>
        <div class="svc-grid" id="appList"></div>
    </div>

    <div id="adminView">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 style="color:var(--gold); margin:0;">ADMIN PANEL</h2>
            <button onclick="document.getElementById('adminView').style.display='none'" style="background:#334155; color:#fff; border:none; padding:10px 20px; border-radius:10px;">EXIT</button>
        </div>

        <div class="admin-box">
            <h4 style="margin-top:0; color:var(--gold);">CREATE MANUAL INVOICE</h4>
            <input type="text" id="mCust" class="m-input" placeholder="Customer Name">
            <div id="workItems">
                <div style="display:flex; gap:8px; margin-bottom:10px;">
                    <input type="text" class="m-work m-input" style="flex:2; margin:0;" placeholder="Service">
                    <input type="number" class="m-price m-input" style="flex:1; margin:0;" placeholder="Price">
                </div>
            </div>
            <button onclick="addWorkRow()" style="background:#1e293b; color:var(--gold); border:1px solid #333; padding:12px; width:100%; border-radius:10px; margin-bottom:15px; font-weight:bold;">+ ADD NEW ITEM</button>
            <button onclick="saveAndPrint()" style="background:var(--gold); color:#000; padding:18px; border-radius:12px; border:none; width:100%; font-weight:900; font-size:16px; cursor:pointer;">SAVE & DOWNLOAD PDF</button>
        </div>

        <h4 style="color:#64748b; margin-bottom:15px;">RECENT CUSTOMERS</h4>
        <div id="cloudRecords">Syncing with Google Sheets...</div>
    </div>

    <div class="footer-info" onclick="adminLogin()">
        © 2026 DNHQ SERVICES KARACHI | REGISTERED BRAND<br>TAP TO ACCESS ADMIN LOGIN
    </div>

    <div class="checkout-bar" id="cartBar">
        <div style="display:flex; justify-content:space-between; align-items:center; max-width:550px; margin:0 auto;">
            <div>
                <small style="color:#94a3b8;">Total Bill</small>
                <div style="font-size:22px; font-weight:900; color:var(--gold);">Rs <span id="finalTotal">0</span></div>
            </div>
            <button onclick="sendWA()" style="background:var(--gold); color:#000; padding:15px 30px; border-radius:12px; border:none; font-weight:900; font-size:14px; box-shadow: 0 4px 15px rgba(251,191,36,0.3);">BOOK SERVICE</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwI_fTT4vMiuPjehYhnyADO8_ZS0XifwZbKAuPEqrJoxB-uWf48UjkKuyO9IOHTkJccPw/exec";

        // 📋 COMPLETE 25+ SERVICES MASTER LIST
        const services = {
            ac: [
                {n:"Split AC Master Service", p:3500}, {n:"Split AC Normal Service", p:2500},
                {n:"Window AC Service", p:2000}, {n:"AC Gas Refill 1.5T", p:8500},
                {n:"AC Gas Refill 1.0T", p:7500}, {n:"Inverter AC Gas Refill", p:9500},
                {n:"AC Installation", p:4000}, {n:"AC Removal (Dismantle)", p:2000},
                {n:"PCB Repairing", p:3500}, {n:"Leakage Repairing", p:3000},
                {n:"Capacitor/Relay", p:1200}, {n:"Copper Pipe (per ft)", p:1200}
            ],
            elec: [
                {n:"Short Circuit Diagnosis", p:1000}, {n:"DB Box Fitting/Dressing", p:3500},
                {n:"UPS Installation", p:2500}, {n:"New Wiring Point", p:1500},
                {n:"Breaker Replacement", p:800}, {n:"Ceiling Fan Fitting", p:700},
                {n:"Switch Board Repair", p:1000}, {n:"Main Line Repair", p:2500},
                {n:"Bracket Fan Fitting", p:600}, {n:"Exhaust Fan Fitting", p:800}
            ],
            app: [
                {n:"Fridge Gas Refill", p:7500}, {n:"Fridge Thermostat Fix", p:1800},
                {n:"Washing Machine Repair", p:2500}, {n:"Water Dispenser Fix", p:2000},
                {n:"Microwave Oven Repair", p:2000}
            ]
        };

        let cart = [];

        window.onload = () => {
            renderList('acList', services.ac);
            renderList('elecList', services.elec);
            renderList('appList', services.app);
        };

        function renderList(id, data) {
            document.getElementById(id).innerHTML = data.map(s => `
                <div class="svc-item" onclick="toggleSvc(this,'${s.n}',${s.p})">
                    <b>${s.n}</b>
                    <div class="svc-rate"><i class="fas fa-tag"></i> Rs ${s.p}</div>
                </div>`).join('');
        }

        function toggleSvc(el, n, p) {
            const i = cart.findIndex(c => c.n === n);
            if(i > -1) { cart.splice(i, 1); el.classList.remove('selected'); }
            else { cart.push({n, p}); el.classList.add('selected'); }
            
            const total = cart.reduce((a, b) => a + b.p, 0);
            document.getElementById('cartBar').style.display = cart.length > 0 ? 'block' : 'none';
            document.getElementById('finalTotal').innerText = total.toLocaleString();
        }

        function adminLogin() {
            if(prompt("ADMIN PIN:") === "dnhq123") {
                document.getElementById('adminView').style.display = 'block';
                fetchCloudData();
            }
        }

        function addWorkRow() {
            const div = document.createElement('div');
            div.style.display = "flex"; div.style.gap = "8px"; div.style.marginBottom = "10px";
            div.innerHTML = `<input type="text" class="m-work m-input" style="flex:2; margin:0;" placeholder="Service"><input type="number" class="m-price m-input" style="flex:1; margin:0;" placeholder="Price">`;
            document.getElementById('workItems').appendChild(div);
        }

        async function saveAndPrint() {
            const client = document.getElementById('mCust').value;
            const wItems = document.querySelectorAll('.m-work');
            const pItems = document.querySelectorAll('.m-price');
            let rows = []; let total = 0;

            wItems.forEach((n, i) => { 
                if(n.value) { 
                    rows.push([n.value, `Rs ${pItems[i].value}`]); 
                    total += parseInt(pItems[i].value || 0);
                } 
            });

            if(!client || rows.length === 0) return alert("Fill customer name & services!");

            // PDF
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.setFillColor(0,0,0); doc.rect(0,0,210,45,'F');
            doc.setTextColor(251,191,36); doc.setFontSize(26); doc.text("DNHQ SERVICES", 15, 28);
            doc.setFontSize(10); doc.text("Quality Maintenance | Karachi", 15, 38);
            
            doc.setTextColor(0,0,0); doc.setFontSize(12); doc.text(`Bill To: ${client}`, 15, 60);
            doc.text(`Date: ${new Date().toLocaleDateString()}`, 150, 60);

            doc.autoTable({ startY: 70, head: [['Description', 'Amount']], body: rows, headStyles: {fillColor: [0,0,0], textColor: [251,191,36]} });
            doc.setFontSize(14); doc.text(`Total Amount: Rs ${total}`, 150, doc.lastAutoTable.finalY + 15);
            doc.save(`DNHQ_${client}.pdf`);

            // Cloud Save
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:"add", date:new Date().toLocaleDateString(), client, work:rows.map(r=>r[0]).join(", "), total}) });
            alert("Record Saved to Sheet!"); fetchCloudData();
        }

        async function fetchCloudData() {
            const container = document.getElementById('cloudRecords');
            container.innerHTML = "<div style='text-align:center; padding:20px;'><i class='fas fa-spinner fa-spin'></i> Syncing...</div>";
            try {
                const res = await fetch(SCRIPT_URL + "?v=" + new Date().getTime());
                const data = await res.json();
                
                // Hum data ko reverse kar rahay hain taake naye bills upar aayen
                const rawData = data.slice(); 
                const displayData = data.slice().reverse();

                container.innerHTML = displayData.map((d, index) => {
                    // Sahi Row Index nikalne ke liye (Header=1 + Original Position)
                    const originalIndex = rawData.length - index; 
                    return `
                    <div class="cust-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <b style="color:var(--gold); font-size:16px;">${d.client}</b>
                            <small style="color:#64748b;">${d.date}</small>
                        </div>
                        <p style="font-size:12px; color:#cbd5e1; margin:0 0 10px;">${d.work}</p>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <b style="font-size:15px;">Rs ${d.total}</b>
                            <button onclick='deleteRecord(${originalIndex}, "${d.client}")' style="background:none; color:#ef4444; border:1px solid #ef4444; padding:5px 12px; border-radius:6px; font-size:11px; cursor:pointer;">DELETE</button>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) { container.innerHTML = "Sync Error. Check Internet."; }
        }

        async function deleteRecord(rowIdx, name) {
            if(!confirm(`Are you sure to delete ${name}'s record?`)) return;
            
            // Visual feedback
            document.getElementById('cloudRecords').innerHTML = "Deleting from Google Sheets...";
            
            // Header row 1 hoti hai, aur records niche se shuru hote hain
            const sheetRow = rowIdx + 1; 

            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({action: "delete", row: sheetRow}) 
                });
                
                // Delay to allow Google Sheets to process
                setTimeout(fetchCloudData, 1500);
            } catch(e) {
                alert("Failed to delete.");
                fetchCloudData();
            }
        }

        function sendWA() {
            const n = prompt("Customer Name:"); if(!n) return;
            const w = cart.map(c => c.n).join(", ");
            const t = cart.reduce((a, b) => a + b.p, 0);
            window.location.href = `https://wa.me/923152458657?text=*NEW ORDER FROM DNHQ PORTAL*%0A%0A*Client:* ${n}%0A*Services:* ${w}%0A*Total Bill:* Rs ${t}`;
        }
    </script>
</body>
</html>
