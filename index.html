<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DN/HQ Services - Fixed</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f8fafc; text-align: center; color: #333; }
        .nav { background: #0f172a; padding: 15px; color: #eab308; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 9999; }
        .hero { background: #1e293b; color: white; padding: 40px; border-bottom: 8px solid #eab308; }
        .card-container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        .card { background: white; width: 280px; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-bottom: 5px solid #ccc; }
        
        /* Buttons */
        .click-btn { display: block; width: 100%; padding: 12px; margin-top: 10px; background: #eab308; border: none; border-radius: 8px; font-weight: bold; cursor: pointer !important; }
        
        /* Overlays */
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; padding: 20px; text-align: left; overflow-y: auto; }
        #bookingModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10001; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; }
        
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="nav">
        <b>DN/HQ SERVICES</b>
        <button class="click-btn" style="width:auto; margin:0; padding:5px 15px; background:#334155; color:#eab308;" 
                onclick="var p=prompt('Password:'); if(p==='1234'){document.getElementById('adminPanel').style.display='block';}">
            Admin Login
        </button>
    </div>

    <div class="hero">
        <h1>AC & ELECTRICAL EXPERTS</h1>
        <p>Quality Maintenance in Karachi</p>
    </div>

    <div class="card-container">
        <div class="card" style="border-color: #3b82f6;">
            <h2 style="color:#3b82f6;">AC Service</h2>
            <button class="click-btn" style="background:#3b82f6; color:white;" 
                    onclick="window.currentCat='AC'; document.getElementById('workOpt').innerHTML='<option>General Service</option><option>Gas Refill</option><option>Installation</option>'; document.getElementById('bookingModal').style.display='flex';">
                View Options
            </button>
        </div>

        <div class="card" style="border-color: #eab308;">
            <h2 style="color:#eab308;">Electrician</h2>
            <button class="click-btn" 
                    onclick="window.currentCat='Electrical'; document.getElementById('workOpt').innerHTML='<option>Light Points</option><option>Wiring</option><option>DB Box</option>'; document.getElementById('bookingModal').style.display='flex';">
                View Options
            </button>
        </div>
    </div>

    <div id="bookingModal">
        <div class="modal-box">
            <h3>Select Service</h3>
            <select id="workOpt"></select>
            <input type="text" id="custName" placeholder="Your Name">
            <button class="click-btn" style="background:#25d366; color:white;" 
                    onclick="var n=document.getElementById('custName').value; var w=document.getElementById('workOpt').value; if(n){window.open('https://wa.me/923152458657?text=Booking: '+window.currentCat+' - '+w+' Name: '+n);}else{alert('Enter Name');}">
                Confirm WhatsApp
            </button>
            <button onclick="document.getElementById('bookingModal').style.display='none';" style="margin-top:15px; border:none; background:none; color:red; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>ADMIN BILLING</h2>
            <button onclick="document.getElementById('adminPanel').style.display='none';" style="background:red; color:white; border:none; padding:10px;">Logout</button>
        </div>
        <hr>
        <input type="text" id="bName" placeholder="Customer Name">
        <input type="tel" id="bPhone" placeholder="WhatsApp Number">
        <div style="background:#eee; padding:10px; margin:10px 0; border-radius:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div>Light Pts: <input type="number" id="lPts" value="0"></div>
            <div>Wiring Pts: <input type="number" id="wPts" value="0"></div>
            <div>AC Master: <input type="number" id="acM" value="0"></div>
            <div>AC Norm: <input type="number" id="acN" value="0"></div>
        </div>
        <button class="click-btn" style="background:green; color:white;" 
                onclick="var total=(document.getElementById('lPts').value*500)+(document.getElementById('wPts').value*1500)+(document.getElementById('acM').value*3500)+(document.getElementById('acN').value*2500); document.getElementById('billOut').innerHTML='Total Bill: Rs '+total; window.billAmt=total;">
            Generate Bill
        </button>
        <h3 id="billOut" style="text-align:center; color:green;"></h3>
        <button class="click-btn" style="background:#25d366; color:white;" 
                onclick="var p=document.getElementById('bPhone').value; if(p.startsWith('0'))p='92'+p.substring(1); window.open('https://wa.me/'+p+'?text=DN/HQ Services Bill: Rs '+window.billAmt);">
            Send to WhatsApp
        </button>
        <br>
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQh7oi7i-aqkfxZPRJ6MnQTnkgjm2RP5t_R4lhuGHtMz98ZCNyAqaefyOVRdWLZ4de4fAWLwXzwGKXx/pubhtml" style="width:100%; height:300px;"></iframe>
    </div>

</body>
</html>
